<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0b0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Treino">
<link rel="manifest" href='data:application/manifest+json,{"name":"Treino","short_name":"Treino","start_url":".","display":"standalone","background_color":"%230b0f14","theme_color":"%230b0f14","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%2322c55e%22/%3E%3Ctext x=%2250%22 y=%2268%22 font-size=%2260%22 text-anchor=%22middle%22 fill=%22%23fff%22 font-family=%22sans-serif%22%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E","sizes":"any","type":"image/svg+xml"}]}'>
<title>Treino</title>
<style>
:root{
  --bg:#0b0f14; --surface:#141b24; --surface2:#1c2530; --border:#26313d;
  --text:#e6edf3; --muted:#8b97a6; --accent:#22c55e; --accent2:#3b82f6;
  --danger:#ef4444; --warn:#f59e0b; --radius:14px; --sp:8px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:16px;line-height:1.4;padding-bottom:76px;
  padding-top:env(safe-area-inset-top);
  -webkit-user-select:none;user-select:none;
}
input,textarea{-webkit-user-select:text;user-select:text}
h1,h2,h3{margin:0 0 10px;font-weight:650}
h1{font-size:20px}h2{font-size:17px}h3{font-size:15px}
.wrap{max-width:640px;margin:0 auto;padding:18px 16px 0}
.muted{color:var(--muted);font-size:13px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
button{font-family:inherit;font-size:15px;cursor:pointer;border:none;border-radius:10px;padding:12px 16px;color:#fff;background:var(--surface2);transition:opacity .15s}
button:active{opacity:.6}
.btn-primary{background:var(--accent)}
.btn-blue{background:var(--accent2)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger)}
.btn-sm{padding:8px 12px;font-size:13px}
.row{display:flex;gap:10px;align-items:center}
.row.wrap{flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
input,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px;font-size:16px;text-align:center}
input:focus,select:focus{outline:2px solid var(--accent2);border-color:transparent}
label.fld{display:block;font-size:11px;color:var(--muted);text-align:center;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(11,15,20,.92);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;padding:6px 6px calc(6px + env(safe-area-inset-bottom));z-index:50}
.tabbar button{flex:1;background:none;color:var(--muted);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0}
.tabbar button.active{color:var(--accent)}
.tabbar .ic{font-size:20px}
.daygrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.daycard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:left}
.daycard .big{font-size:32px;font-weight:750;color:var(--accent)}
.ex{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.ex-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.ex-title{font-weight:650;font-size:15px}
.exdone{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);padding:13px 15px;margin-bottom:12px;cursor:pointer;transition:opacity .2s}
.exdone:active{opacity:.6}
.exdone .ck{color:var(--accent);font-weight:800;font-size:16px}
.exdone .nm{font-weight:650;font-size:15px}
.exdone .sm{color:var(--muted);font-size:13px;margin-left:auto;text-align:right}
.lastbox{background:var(--surface2);border-left:3px solid var(--accent);border-radius:8px;padding:9px 11px;margin-bottom:9px}
.lastbox .hl{color:var(--text);font-weight:600;font-size:16px;margin-top:2px;line-height:1.35}
.lastbox .lbl{font-size:10px;letter-spacing:.5px;color:var(--muted)}
.trend{display:inline-block;font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px;margin-left:6px;vertical-align:middle}
.trend.up{background:rgba(34,197,94,.16);color:var(--accent)}
.trend.dn{background:rgba(239,68,68,.16);color:#fca5a5}
.trend.eq{background:var(--surface);color:var(--muted)}
.histrow{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:baseline;padding:6px 0;border-top:1px solid var(--border);font-size:13px}
.histrow .hd{color:var(--muted);white-space:nowrap}
.histrow .hs{text-align:right}
.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:6px;background:var(--surface2);color:var(--muted);margin-left:6px;vertical-align:middle}
.tag.mvw{background:rgba(245,158,11,.15);color:var(--warn)}
.setrow{display:grid;grid-template-columns:26px 1fr 1fr 1fr 34px;gap:8px;align-items:center;margin-bottom:8px}
.setrow .idx{color:var(--muted);text-align:center;font-size:13px}
.setrow .del{background:none;color:var(--muted);padding:4px;font-size:16px}
.pill{display:inline-block;padding:3px 8px;border-radius:20px;background:var(--surface2);font-size:12px;color:var(--muted);margin:2px 4px 2px 0}
.sessionbar{position:fixed;left:0;right:0;bottom:calc(66px + env(safe-area-inset-bottom));z-index:45;display:none;padding:0 12px;pointer-events:none}
.sessionbar.on{display:block}
.sb-inner{max-width:640px;margin:0 auto;position:relative;min-height:60px;border-radius:14px;overflow:hidden;pointer-events:auto;background:var(--surface2);border:1px solid var(--border);box-shadow:0 6px 22px rgba(0,0,0,.45);transition:background-color .3s ease,border-color .3s ease}
.sessionbar.resting .sb-inner{background:var(--accent2);border-color:transparent}
.sb-idle,.sb-rest{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 16px;transition:opacity .25s ease}
.sb-rest{opacity:0;pointer-events:none}
.sessionbar.resting .sb-idle{opacity:0;pointer-events:none}
.sessionbar.resting .sb-rest{opacity:1;pointer-events:auto}
.sb-t{font-size:22px;font-weight:750;font-variant-numeric:tabular-nums;line-height:1.05}
.sb-lbl{font-size:10px;letter-spacing:.5px;color:var(--muted)}
.sb-rest .sb-lbl{color:rgba(255,255,255,.8)}
.sessionbar.resting.over .sb-inner{background:var(--danger);animation:pulseOver 1s ease-in-out infinite}
@keyframes pulseOver{0%,100%{box-shadow:0 6px 22px rgba(239,68,68,.5)}50%{box-shadow:0 6px 30px rgba(239,68,68,.85)}}
.ex.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 4px 16px rgba(34,197,94,.12)}
.ex.active .ex-title::before{content:"▶ ";color:var(--accent);font-size:12px}
.sess{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--border)}
.sess:last-child{border-bottom:none}
.dot{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;background:var(--surface2)}
canvas{width:100%;height:auto;display:block}
.toast{position:fixed;bottom:150px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:20px;font-size:13px;z-index:100;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
.empty{text-align:center;color:var(--muted);padding:40px 20px}
.empty .ic{font-size:40px;opacity:.5}
textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px;font-size:13px;font-family:ui-monospace,monospace;min-height:200px;text-align:left}
.seg{display:flex;background:var(--surface2);border-radius:10px;padding:3px;gap:3px;margin-bottom:12px}
.seg button{flex:1;background:none;color:var(--muted);padding:8px;font-size:13px}
.seg button.active{background:var(--accent);color:#fff}
hr{border:none;border-top:1px solid var(--border);margin:14px 0}
a{color:var(--accent2)}
/* tema claro */
body.light{--bg:#f4f6f9;--surface:#ffffff;--surface2:#eef2f7;--border:#d5dde6;--text:#17202a;--muted:#5c6b7a}
body.light .tabbar{background:rgba(255,255,255,.92)}
/* modo largo (aba análise no desktop) */
body.wide .wrap{max-width:1180px}
.dashgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:14px}
.dashgrid .full{grid-column:1 / -1}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<div class="sessionbar" id="sessionbar">
  <div class="sb-inner">
    <div class="sb-idle">
      <div><div class="sb-lbl">TEMPO TOTAL</div><div class="sb-t" id="sbElapsed">0:00</div></div>
      <div style="text-align:right"><div class="sb-lbl" id="sbProg">0/0 ex</div><div class="muted" id="sbVol" style="font-size:12px">0 kg·rep</div></div>
    </div>
    <div class="sb-rest">
      <div><div class="sb-lbl"><span id="sbRestLbl">DESCANSO</span> <span id="sbRestTgt"></span></div><div class="sb-t" id="sbRestT" style="color:#fff">0:00</div></div>
      <div style="text-align:right">
        <div class="sb-lbl">TOTAL <span id="sbElapsedR" style="color:#fff;font-weight:700">0:00</span></div>
        <div class="row" style="margin-top:5px;justify-content:flex-end">
          <button class="btn-sm" style="background:#fff;color:#0b0f14;font-weight:700" onclick="markLap()">🏁 Próxima</button>
          <button class="btn-sm" style="background:rgba(255,255,255,.2)" onclick="stopRest()">Parar</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="tabbar" id="tabbar"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============ STORE ============ */
const K = {tpl:"gymlog_templates_v3", sess:"gymlog_sessions_v1", active:"gymlog_active_v1", cfg:"gymlog_cfg_v1"};
const load = (k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}};
const save = (k,v)=>localStorage.setItem(k,JSON.stringify(v));

/* Templates do vault Obsidian — Ciclo 3 (01 Junho 2026, treino-atual) */
const DEFAULT_TEMPLATES = {
  A:{name:"Pernas & Glúteos I", ex:[
    {n:"Hips Thrust - Máquina", sr:"4×10", rest:120, mvw:true, notes:"Principal — meta 90kg×10 limpas; squeeze topo 2s"},
    {n:"Leg Press", sr:"4×10", rest:120, mvw:true, notes:"Meta 170kg. Pés altos e afastados"},
    {n:"Agachamento Goblet - Haltere", sr:"3×12", rest:90, mvw:false, notes:"Amplitude completa (24kg→volta ao frontal)"},
    {n:"Extensão Coxa - Máquina", sr:"3×10", rest:60, mvw:true, notes:"Pausa 1s no topo. Meta 95kg×10"},
    {n:"Abdução - máquina (sem descanso)", sr:"3×15", rest:0, mvw:false, notes:"Drop 130/105/80kg"},
    {n:"Panturrilha", sr:"3×15", rest:45, mvw:false, notes:"45kg. Pausa 2s no topo"},
  ]},
  B:{name:"Peito & Tríceps", ex:[
    {n:"Supino reto - banco", sr:"4×8-10", rest:150, mvw:true, notes:"Principal — subir carga (52-55kg)"},
    {n:"Supino Declinado - Smith ou Banco", sr:"3×10", rest:120, mvw:false, notes:"Foco peito inferior"},
    {n:"Fly para baixo - polia", sr:"4×12", rest:60, mvw:true, notes:"⭐ CHAVE peito inferior. Meta 30kg×12"},
    {n:"Dips", sr:"3×máx", rest:90, mvw:false, notes:"Tronco à frente = peito inferior. Até a falha"},
    {n:"V-Bar Extension", sr:"4×12", rest:60, mvw:true, notes:"Consolidar 25kg×12"},
    {n:"Overhead Triceps Extension - Corda", sr:"3×12", rest:60, mvw:false, notes:""},
  ]},
  C:{name:"Pernas & Glúteos II", ex:[
    {n:"Stiff - com barra solta", sr:"3×10-12", rest:120, mvw:true, notes:"Meta 42kg×12→45kg×10. Stretch no glúteo"},
    {n:"Agachamento Búlgaro - Smith", sr:"3×10", rest:90, mvw:true, notes:"Consolidar 25kg×10. Passo longo"},
    {n:"Cadeira Flexora deitada", sr:"3×12", rest:60, mvw:true, notes:"Reavaliar carga semana 1"},
    {n:"Afundo - Smith nas costas", sr:"3×10", rest:90, mvw:false, notes:"Meta 30kg. Passo longo"},
    {n:"Levantamento lateral - Polia", sr:"3×12", rest:45, mvw:false, notes:"7.5kg. Glúteo médio, tronco reto"},
    {n:"Chute - Coice", sr:"3×12", rest:45, mvw:false, notes:"15kg. Hiperextensão do quadril"},
  ]},
  D:{name:"Costas, Ombros & Bíceps", ex:[
    {n:"Desenvolvimento Militar (Máquina)", sr:"3×10-12", rest:120, mvw:true, notes:"Consolidar 45kg×10"},
    {n:"Pulldown Machine", sr:"4×10", rest:90, mvw:true, notes:"Consolidar 45kg×10. Pegada larga"},
    {n:"Remada máquina", sr:"3×12", rest:90, mvw:false, notes:"Fixar 45kg estável"},
    {n:"Elevação Lateral com Halteres", sr:"4×12", rest:45, mvw:true, notes:"12kg. 4×12 todas limpas"},
    {n:"Face Pull - Polia Corda", sr:"3×15", rest:45, mvw:false, notes:"Saúde dos ombros. Carga leve, contração forte"},
    {n:"Rosca direta com barra W", sr:"3×10-12", rest:60, mvw:false, notes:"38kg"},
    {n:"Adbomen - Cadeira Inclinada", sr:"3×15", rest:45, mvw:false, notes:"Disco 5kg no peito"},
  ]},
};

let templates = load(K.tpl, null) || DEFAULT_TEMPLATES;
let sessions  = load(K.sess, []);
let active    = load(K.active, null);
let cfg       = load(K.cfg, {ciclo:"C4", plano:"ABCD", musicUrl:""});
const GOALS_DEFAULT={weight:[81,83], fat:[15,17], lean:66}; // metas de recomposição
function goals(){return cfg.goals||GOALS_DEFAULT;}
function applyTheme(){document.body.classList.toggle("light",cfg.theme==="light");}
let tab = active ? "log" : "home";

/* ============ HELPERS ============ */
const $ = s=>document.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc = s=>String(s).replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));
function today(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("on");clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove("on"),1600);}
function setVol(sets){return sets.reduce((a,s)=>a+(parseFloat(s.w)||0)*(parseFloat(s.r)||0),0);}
function targetSets(e){const m=String(e.sr||"").match(/^\s*(\d+)/);return m?+m[1]:0;}
function completedSets(e){return e.sets.filter(s=>s.r!==""&&s.r!=null).length;}
const INTER_REST=120; // descanso padrão entre exercícios (2min)
function topWeight(sets){return sets.reduce((a,s)=>Math.max(a,parseFloat(s.w)||0),0);}
function fmtClock(ts){if(!ts)return"--:--";const d=new Date(ts);return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function durMin(s){if(!s.started||!s.finished)return null;return Math.max(1,Math.round((s.finished-s.started)/60000));}
function fmtDur(ms){const t=Math.max(0,Math.floor(ms/1000));const h=Math.floor(t/3600),m=Math.floor((t%3600)/60),sec=t%60;
  return (h?h+":"+String(m).padStart(2,"0"):m)+":"+String(sec).padStart(2,"0");}
let elapsedId=null;
function startElapsed(){clearInterval(elapsedId);
  const tick=()=>{if(!active){clearInterval(elapsedId);return;}const s=fmtDur(Date.now()-active.started);
    const e=$("#sbElapsed");if(e)e.textContent=s;const e2=$("#sbElapsedR");if(e2)e2.textContent=s;};
  tick();elapsedId=setInterval(tick,1000);}
function refreshSbIdle(){if(!active)return;const p=$("#sbProg"),v=$("#sbVol");
  const done=active.exercises.filter(e=>e.sets.length).length;
  if(p)p.textContent=done+"/"+active.exercises.length+" ex";
  if(v)v.textContent=Math.round(sessVol(active))+" kg·rep";}
function updateSessionBar(){const sb=$("#sessionbar");if(!sb)return;
  if(tab==="log"&&active){sb.classList.add("on");refreshSbIdle();startElapsed();}
  else{sb.classList.remove("on","resting");clearInterval(swId);clearInterval(elapsedId);}}
function openMusic(){if(!cfg.musicUrl){toast("Configure a playlist em Ajustes");go("cfg");return;}
  window.open(cfg.musicUrl,"_blank");}
function openExDemo(name){window.open("https://www.google.com/search?tbm=isch&q="+encodeURIComponent(name+" exercício execução academia"),"_blank");}

/* ============ CRONÔMETRO DE DESCANSO (conta pra cima, grava a pausa real) ============ */
let swId=null, swStart=0, swTarget=0, swExIdx=-1, swBeeped=false;
function startRest(exIdx){const e=active.exercises[exIdx]||{};swExIdx=exIdx;swStart=Date.now();swBeeped=false;
  const inter=targetSets(e)&&completedSets(e)>=targetSets(e);
  swTarget=inter?INTER_REST:(e.rest||0);
  const lb=$("#sbRestLbl");if(lb)lb.textContent=inter?"ENTRE EXERCÍCIOS":"DESCANSO";
  const tg=$("#sbRestTgt");if(tg)tg.textContent=swTarget?"(meta "+(inter?"2min":swTarget+"s")+")":"";
  const sb=$("#sessionbar");if(sb){sb.classList.add("on","resting");sb.classList.remove("over");}swTick();clearInterval(swId);swId=setInterval(swTick,250);}
function swTick(){const sec=Math.floor((Date.now()-swStart)/1000);
  const over=swTarget&&sec>=swTarget;
  const e2=$("#sbRestT");if(e2){const mm=Math.floor(sec/60)+":"+String(sec%60).padStart(2,"0");
    e2.textContent=over?"+"+mm:mm;}
  const sb=$("#sessionbar");if(sb)sb.classList.toggle("over",!!over);
  if(over&&!swBeeped){swBeeped=true;beep();}}
function markLap(){const sec=Math.round((Date.now()-swStart)/1000);
  const e=active.exercises[swExIdx];
  if(e){if(e.sets.length){const ls=e.sets[e.sets.length-1];ls.rest=sec;ls.t=Date.now();}
    if(targetSets(e)&&completedSets(e)>=targetSets(e)){e.done=true;e.open=false;} // alvo atingido → conclui exercício
    else{const last=e.sets[e.sets.length-1]||{};e.sets.push({w:last.w||"",r:last.r||"",rir:last.rir||""});}
    persistActive();}
  stopRest();render();
  toast(sec+"s registrado");}
function stopRest(){clearInterval(swId);const sb=$("#sessionbar");if(sb)sb.classList.remove("resting","over");}
function beep(){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.value=.1;o.start();setTimeout(()=>{o.stop();c.close();},400);}catch(e){}
  if(navigator.vibrate)navigator.vibrate([200,80,200]);}

/* ============ NAV ============ */
function isDesktop(){return window.matchMedia("(min-width: 900px)").matches;}
function go(t){tab=t;render();window.scrollTo(0,0);}
function renderTabs(){
  const tabs=[["home","🏠","Treinar"],["hist","📈","Histórico"]];
  if(isDesktop())tabs.push(["analise","📊","Análise"]);
  tabs.push(["cfg","⚙️","Ajustes"]);
  const tb=$("#tabbar");tb.innerHTML="";
  tabs.forEach(([id,ic,lb])=>{const b=el("button",(tab===id||(id==="home"&&tab==="log"))?"active":"","<span class='ic'>"+ic+"</span>"+lb);
    b.onclick=()=>go(id);tb.appendChild(b);});
}

/* ============ RENDER ROUTER ============ */
function render(){renderTabs();const a=$("#app");a.innerHTML="";
  if(tab==="analise"&&!isDesktop())tab="hist";
  document.body.classList.toggle("wide",tab==="analise");
  if(tab==="log"&&active) renderLog(a);
  else if(tab==="home") renderHome(a);
  else if(tab==="hist") renderHist(a);
  else if(tab==="analise") renderAnalise(a);
  else if(tab==="cfg")  renderCfg(a);
  else renderHome(a);
  updateSessionBar();
}

/* ---------- HOME ---------- */
function renderHome(a){
  a.appendChild(el("div","row",""+
    "<div style='flex:1'><h1>Treino</h1><div class='muted'>Ciclo "+esc(cfg.ciclo)+" · Plano "+esc(cfg.plano)+"</div></div>"));
  if(active){
    const c=el("div","card");
    c.style.borderColor="var(--accent)";
    c.innerHTML="<div class='muted'>Sessão em andamento</div><h2 style='margin:4px 0'>Treino "+active.day+" — "+esc(templates[active.day].name)+"</h2>";
    const b=el("button","btn-primary","Continuar treino →");b.style.width="100%";b.onclick=()=>go("log");

  active={day:d,date:today(),ciclo:cfg.ciclo,plano:cfg.plano,started:Date.now(),
    exercises:t.ex.map(e=>({n:e.n,sr:e.sr,rest:e.rest,mvw:e.mvw,notes:e.notes,sets:[]}))};
  save(K.active,active);go("log");
}

function exerciseHistory(name){
  const out=[];
  for(let i=sessions.length-1;i>=0;i--){const s=sessions[i];const ex=s.exercises.find(x=>x.n===name);
    if(ex&&ex.sets.length)out.push({date:s.date,day:s.day,sets:ex.sets,top:topWeight(ex.sets),vol:setVol(ex.sets)});}
  return out;
}
function fmtSets(sets){return sets.map(st=>(st.w||"?")+"kg×"+(st.r||"?")).join(" · ");}
// condensa séries idênticas: [100×10 ×4] -> "4× 100kg×10"
function summarizeSets(sets){if(!sets.length)return"";const p=[];let i=0;
  while(i<sets.length){const w=sets[i].w||"?",r=sets[i].r||"?";let c=1;
    while(i+c<sets.length&&(sets[i+c].w||"?")===w&&(sets[i+c].r||"?")===r)c++;
    p.push((c>1?c+"× ":"")+w+"kg×"+r);i+=c;}
  return p.join(" · ");}
// selo de evolução comparando carga máx da última vs a anterior
function trendChip(H){if(H.length<2)return"";const d=Math.round((H[0].top-H[1].top)*10)/10;
  if(d>0)return"<span class='trend up'>↑ +"+d+"kg</span>";
  if(d<0)return"<span class='trend dn'>↓ "+d+"kg</span>";
  return"<span class='trend eq'>= manteve</span>";}

function sessionMarkdown(s){
  const t=templates[s.day];const name=t?t.name:s.day;
  const dmy=durMin(s);
  let md="---\ntags: [treino]\nPlano: "+(s.plano||cfg.plano)+"\nCiclo: "+(s.ciclo||cfg.ciclo)+"\nInício: "+s.date+
    (s.started?"\nHora: "+fmtClock(s.started):"")+(dmy?"\nDuração: "+dmy:"")+"\n---\n\n";
  md+="# Treino "+s.day+" — "+name+" ("+s.date+")\n\n";
  md+="| Ordem | Exercício | Séries×Reps | Descanso | Notas |\n";
  md+="|-------|-----------|-------------|----------|-------|\n";
  let restTotal=0;
  s.exercises.forEach((e,i)=>{
    const sets=e.sets.map(st=>(st.w?st.w+"kg×":"")+ (st.r||"?")).join(" · ");
    const rirs=e.sets.map(st=>st.rir).filter(x=>x!=null&&x!=="");
    const rr=e.sets.map(st=>st.rest).filter(x=>x!=null);
    rr.forEach(x=>restTotal+=x);
    const restCol=rr.length?rr.map(x=>x+"s").join("·")+" (méd "+Math.round(rr.reduce((a,b)=>a+b,0)/rr.length)+"s)":(e.rest?"alvo "+e.rest+"s":"—");
    const note=[e.notes,rirs.length?"RIR "+rirs.join("/"):""].filter(Boolean).join(" · ");
    md+="| "+(i+1)+" | [["+e.n+"]]"+(e.mvw?" 🔑":"")+" | "+sets+" | "+restCol+" | "+note+" |\n";
  });
  md+="\n**Volume total:** "+Math.round(sessVol(s))+" kg·rep\n";
  const dm=durMin(s);
  if(dm)md+="**Duração:** "+dm+" min ("+fmtClock(s.started)+"–"+fmtClock(s.finished)+")\n";
  if(restTotal)md+="**Descanso total:** "+Math.round(restTotal/60)+" min ("+restTotal+"s registrados)\n";
  return md;
}

function drawChart(cv,pts,unit){
  const dpr=window.devicePixelRatio||1;const W=cv.clientWidth,H=200;
  cv.width=W*dpr;cv.height=H*dpr;const ctx=cv.getContext("2d");ctx.scale(dpr,dpr);
  const pad={l:38,r:12,t:14,b:26};
  const xs=pts.map((_,i)=>i),ys=pts.map(p=>p.y);
  let mn=Math.min(...ys),mx=Math.max(...ys);if(mn===mx){mn=mn*0.9;mx=mx*1.1||1;}
  const rng=mx-mn||1;mn-=rng*0.1;mx+=rng*0.1;
  const px=i=>pad.l+(pts.length<=1?(W-pad.l-pad.r)/2:(i/(pts.length-1))*(W-pad.l-pad.r));
  const py=v=>pad.t+(1-(v-mn)/(mx-mn))*(H-pad.t-pad.b);
  // grid + y labels
  ctx.strokeStyle="#26313d";ctx.fillStyle="#8b97a6";ctx.font="10px -apple-system,sans-serif";ctx.lineWidth=1;
  for(let g=0;g<=3;g++){const v=mn+(mx-mn)*g/3,y=py(v);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.textAlign="right";ctx.fillText(Math.round(v),pad.l-5,y+3);}
  // area
  ctx.beginPath();pts.forEach((p,i)=>{const X=px(i),Y=py(p.y);i?ctx.lineTo(X,Y):ctx.moveTo(X,Y);});
  ctx.lineTo(px(pts.length-1),H-pad.b);ctx.lineTo(px(0),H-pad.b);ctx.closePath();
  ctx.fillStyle="rgba(34,197,94,.12)";ctx.fill();
  // line
  ctx.beginPath();pts.forEach((p,i)=>{const X=px(i),Y=py(p.y);i?ctx.lineTo(X,Y):ctx.moveTo(X,Y);});
  ctx.strokeStyle="#22c55e";ctx.lineWidth=2.5;ctx.lineJoin="round";ctx.stroke();
  // points + x labels
  ctx.fillStyle="#22c55e";
  pts.forEach((p,i)=>{const X=px(i),Y=py(p.y);ctx.beginPath();ctx.arc(X,Y,3.5,0,7);ctx.fill();});
  ctx.fillStyle="#8b97a6";ctx.textAlign="center";
  const step=Math.ceil(pts.length/5);
  pts.forEach((p,i)=>{if(i%step===0||i===pts.length-1){ctx.fillText(p.x.slice(5),px(i),H-8);}});
}

function normSessions(){return sessions.map(s=>{
    const exs=(s.exercises||[]).map(e=>{const sets=(e.sets||[]).map(st=>({w:parseFloat(st.w)||0,r:parseFloat(st.r)||0}));
      return {name:e.n,sets,top:sets.reduce((a,x)=>Math.max(a,x.w),0),vol:sets.reduce((a,x)=>a+x.w*x.r,0)};});
    return {day:s.day,date:s.date,exercises:exs,vol:exs.reduce((a,e)=>a+e.vol,0)};
  }).filter(s=>s.date).sort((a,b)=>a.date<b.date?-1:1);}
function moAvg(m){const g={};for(const k in m){(g[k.slice(0,7)]=g[k.slice(0,7)]||[]).push(m[k]);}const o={};for(const y in g)o[y]=g[y].reduce((a,b)=>a+b,0)/g[y].length;return o;}
function latestVal(m){const ks=Object.keys(m||{}).sort();return ks.length?{d:ks[ks.length-1],v:m[ks[ks.length-1]]}:null;}
function avgWin(m,days){const ks=Object.keys(m||{}).sort();if(!ks.length)return null;const end=new Date(ks[ks.length-1]);const v=ks.filter(k=>(end-new Date(k))/864e5<=days).map(k=>m[k]);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function valAgo(m,days){const ks=Object.keys(m||{}).sort();if(!ks.length)return null;const end=new Date(ks[ks.length-1]);const t=new Date(end-days*864e5);let best=null;for(const k of ks){if(new Date(k)<=t)best=m[k];}return best;}
function bfPct(m){const o={};for(const k in (m||{}))o[k]=m[k]<1?m[k]*100:m[k];return o;}
function r1(x){return x==null?"—":Math.round(x*10)/10;}
function arrow(d,good){if(d==null||Math.abs(d)<0.05)return"<span class='trend eq'>=</span>";const up=d>0;const cls=(up===good)?"up":"dn";return "<span class='trend "+cls+"'>"+(up?"↑":"↓")+" "+(d>0?"+":"")+r1(d)+"</span>";}

function buildCharts(sess,H){
  if(!window.Chart)return;
  const cs=getComputedStyle(document.body);
  Chart.defaults.color=(cs.getPropertyValue("--muted").trim())||"#8b97a6";
  Chart.defaults.borderColor=(cs.getPropertyValue("--border").trim())||"#26313d";
  Chart.defaults.font.family="-apple-system,sans-serif";
  const GREEN="#22c55e",BLUE="#3b82f6",WARN="#f59e0b",RED="#ef4444";
  const G=goals();
  const noBandLegend={legend:{labels:{filter:it=>!(it.text||"").startsWith("_")}},tooltip:{filter:it=>!((it.dataset.label||"").startsWith("_"))}};
  const band=(ks,lo,hi,color,axis)=>[
    {label:"_hi",data:ks.map(()=>hi),yAxisID:axis,borderColor:color,borderDash:[5,4],borderWidth:1,pointRadius:0,fill:false},
    {label:"_lo",data:ks.map(()=>lo),yAxisID:axis,borderColor:color,borderDash:[5,4],borderWidth:1,pointRadius:0,fill:"-1",backgroundColor:color.replace(")",",.10)").replace("rgb","rgba")}
  ];
  const mk=(id,cfg)=>{const cv=document.getElementById(id);if(!cv)return;charts.push(new Chart(cv.getContext("2d"),cfg));};
  const line=(d,color,axis,fill)=>({label:d.label,data:d.data,borderColor:color,backgroundColor:fill||color,yAxisID:axis||"y",tension:.25,pointRadius:d.data.length>40?0:2,borderWidth:2,spanGaps:true});
  // treino mensal
  const vol={},cnt={};sess.forEach(s=>{const y=s.date.slice(0,7);vol[y]=(vol[y]||0)+s.vol;cnt[y]=(cnt[y]||0)+1;});
  const tmonths=Object.keys(vol).sort();

  if(H){
    const bm=H.daily.BodyMass_kg||{},bf=bfPct(H.daily.BodyFatPercentage),lm=H.daily.LeanBodyMass_kg||{};
    const ks=[...new Set([...Object.keys(bm),...Object.keys(lm)])].sort().filter(k=>k>="2025-01-01");
    mk("cComp",{type:"line",data:{labels:ks,datasets:[
      ...band(ks,G.weight[0],G.weight[1],"rgb(34,197,94)","y"),
      ...band(ks,G.fat[0],G.fat[1],"rgb(245,158,11)","y1"),
      line({label:"Peso (kg)",data:ks.map(k=>bm[k]??null)},GREEN,"y"),
      line({label:"Massa magra (kg)",data:ks.map(k=>lm[k]??null)},BLUE,"y"),
      line({label:"Gordura (%)",data:ks.map(k=>bf[k]??null)},WARN,"y1"),
    ]},options:{maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:noBandLegend,scales:{
      y:{position:"left",title:{display:true,text:"kg (meta "+G.weight[0]+"–"+G.weight[1]+")"}},y1:{position:"right",grid:{drawOnChartArea:false},title:{display:true,text:"% gordura (meta "+G.fat[0]+"–"+G.fat[1]+")"}},
      x:{ticks:{maxTicksLimit:12}}}}});

    const bfm=moAvg(bf);const months=[...new Set([...tmonths,...Object.keys(bfm)])].sort().filter(m=>m>="2025-11");
    mk("cTrFat",{data:{labels:months,datasets:[
      {type:"bar",label:"Volume (kg·rep)",data:months.map(m=>vol[m]||0),backgroundColor:"rgba(34,197,94,.5)",yAxisID:"y"},
      {type:"line",label:"Gordura (%)",data:months.map(m=>bfm[m]??null),borderColor:WARN,backgroundColor:WARN,yAxisID:"y1",tension:.25,borderWidth:2,spanGaps:true},
    ]},options:{maintainAspectRatio:false,scales:{y:{position:"left"},y1:{position:"right",grid:{drawOnChartArea:false},title:{display:true,text:"%"}}}}});

    mk("cRec",{type:"line",data:{labels:Object.keys(H.daily.RestingHeartRate_bpm||{}).sort().filter(k=>k>="2025-11-01"),datasets:[
      line({label:"FC repouso (bpm)",data:Object.keys(H.daily.RestingHeartRate_bpm||{}).sort().filter(k=>k>="2025-11-01").map(k=>H.daily.RestingHeartRate_bpm[k])},RED,"y"),
    ]},options:{maintainAspectRatio:false,scales:{x:{ticks:{maxTicksLimit:10}}}}});
    // HRV as second chart dataset overlaid: rebuild cRec with both aligned by union
    const rk=[...new Set([...Object.keys(H.daily.RestingHeartRate_bpm||{}),...Object.keys(H.daily.HRV_SDNN_ms||{})])].sort().filter(k=>k>="2025-11-01");
    charts.pop().destroy();
    mk("cRec",{type:"line",data:{labels:rk,datasets:[
      line({label:"FC repouso (bpm)",data:rk.map(k=>(H.daily.RestingHeartRate_bpm||{})[k]??null)},RED,"y"),
      line({label:"HRV SDNN (ms)",data:rk.map(k=>(H.daily.HRV_SDNN_ms||{})[k]??null)},BLUE,"y1"),
    ]},options:{maintainAspectRatio:false,interaction:{mode:"index",intersect:false},scales:{y:{position:"left",title:{display:true,text:"bpm"}},y1:{position:"right",grid:{drawOnChartArea:false},title:{display:true,text:"ms"}},x:{ticks:{maxTicksLimit:10}}}}});

    const vk=Object.keys(H.daily.VO2Max||{}).sort().filter(k=>k>="2024-06-01");
    mk("cVO2",{type:"line",data:{labels:vk,datasets:[line({label:"VO2 Max",data:vk.map(k=>H.daily.VO2Max[k])},GREEN,"y")]},options:{maintainAspectRatio:false,scales:{x:{ticks:{maxTicksLimit:10}}}}});

    const sm=moAvg(H.sleep_hours_by_night||{});const smk=Object.keys(sm).sort().filter(m=>m>="2025-11");
    mk("cSleep",{type:"bar",data:{labels:smk,datasets:[{label:"h/noite",data:smk.map(m=>sm[m]),backgroundColor:"rgba(59,130,246,.55)"}]},options:{maintainAspectRatio:false,scales:{y:{title:{display:true,text:"h"}}}}});

    // cardio (min/mês) por tipo, do Apple Watch
    const CARDIO=["Walking","Cycling","Running","IndoorCycle","Elliptical","HIIT"];
    const cmin={},ccnt={};(H.workouts||[]).forEach(w=>{if(!w.date||!CARDIO.some(t=>(w.type||"").includes(t)))return;const y=w.date.slice(0,7);cmin[y]=(cmin[y]||0)+(w.duration_min||0);ccnt[y]=(ccnt[y]||0)+1;});
    const cmk=Object.keys(cmin).sort().filter(m=>m>="2025-11");
    const goalMin=8*27; // meta ~2x/sem * ~27min * 4 sem ≈ 216 min/mês
    mk("cCardio",{data:{labels:cmk,datasets:[
      {type:"bar",label:"Cardio (min)",data:cmk.map(m=>Math.round(cmin[m])),backgroundColor:"rgba(34,197,94,.5)",yAxisID:"y"},
      {type:"line",label:"Meta ~"+goalMin+"min",data:cmk.map(()=>goalMin),borderColor:WARN,borderDash:[5,4],borderWidth:1.5,pointRadius:0,yAxisID:"y"},
      {type:"line",label:"Sessões",data:cmk.map(m=>ccnt[m]),borderColor:BLUE,backgroundColor:BLUE,yAxisID:"y1",tension:.25,borderWidth:2},
    ]},options:{maintainAspectRatio:false,scales:{y:{position:"left",title:{display:true,text:"min"}},y1:{position:"right",grid:{drawOnChartArea:false},min:0,title:{display:true,text:"nº"}}}}});
  }

  mk("cVolFreq",{data:{labels:tmonths,datasets:[
    {type:"bar",label:"Volume (kg·rep)",data:tmonths.map(m=>vol[m]),backgroundColor:"rgba(34,197,94,.5)",yAxisID:"y"},
    {type:"line",label:"Sessões",data:tmonths.map(m=>cnt[m]),borderColor:BLUE,backgroundColor:BLUE,yAxisID:"y1",tension:.25,borderWidth:2},
  ]},options:{maintainAspectRatio:false,scales:{y:{position:"left"},y1:{position:"right",grid:{drawOnChartArea:false},min:0}}}});

  // progressão
  const pts=[];sess.forEach(s=>{const e=s.exercises.find(x=>x.name===analProgEx);if(e&&e.top){const e1=Math.max(...e.sets.map(st=>st.w*(1+st.r/30)));pts.push({d:s.date,top:e.top,e1:Math.round(e1)});}});
  mk("cProg",{type:"line",data:{labels:pts.map(p=>p.d),datasets:[
    line({label:"Carga máx (kg)",data:pts.map(p=>p.top)},GREEN,"y"),
    line({label:"1RM est. (kg)",data:pts.map(p=>p.e1)},"rgba(139,151,166,.7)","y"),
  ]},options:{maintainAspectRatio:false,scales:{x:{ticks:{maxTicksLimit:10}}}}});
}

  c4.appendChild(el("h3",null,"📊 Análise (desktop / Apple Health)"));
  c4.appendChild(el("div","muted","JSON canônico com horário de cada série (ISO), pronto pra cruzar com o export do Apple Watch. Salve como <b>treinos.json</b> na pasta <b>54.01 Academia/_dados/</b> do seu vault — o iCloud sincroniza pro Mac e eu leio na consolidação."));
  const ax=el("button","btn-primary btn-sm","⬇ treinos.json (análise)");ax.style.marginTop="8px";
  ax.onclick=()=>download("treinos.json",JSON.stringify(analysisExport(),null,2),"application/json");
  c4.appendChild(ax);
  a.appendChild(c4);
}

/* ---------- EXPORT CANÔNICO (schema gymlog/v1) ---------- */
function isoTs(ts){return ts?new Date(ts).toISOString():null;}
function numOrNull(v){if(v==null||v==="")return null;const n=Number(v);return isNaN(n)?null:n;}
function analysisExport(){
  return {
    schema:"gymlog/v1",
    exportedAt:new Date().toISOString(),
    athlete:"Will",
    cfg:{ciclo:cfg.ciclo,plano:cfg.plano},
    sessions:sessions.map(s=>({
      day:s.day,
      dayName:(templates[s.day]&&templates[s.day].name)||null,
      date:s.date,
      startedAt:isoTs(s.started),
      finishedAt:isoTs(s.finished),
      durationMin:durMin(s),
      exercises:s.exercises.map(e=>({
        name:e.n,
        mvw:!!e.mvw,
        target:e.sr||null,
        sets:e.sets.map((st,i)=>({
          index:i+1,
          weightKg:numOrNull(st.w),
          reps:numOrNull(st.r),
          rir:numOrNull(st.rir),
          restSec:st.rest!=null?st.rest:null,
          completedAt:isoTs(st.t)
        })),
        volumeKgRep:Math.round(setVol(e.sets)),
        topWeightKg:topWeight(e.sets)
      })),
      totals:{
        volumeKgRep:Math.round(sessVol(s)),
        restTotalSec:s.exercises.reduce((a,e)=>a+e.sets.reduce((b,x)=>b+(x.rest||0),0),0),
        sets:s.exercises.reduce((a,e)=>a+e.sets.length,0)
      }
    }))
  };
}

function editTemplate(d){
  const a=$("#app");a.innerHTML="";tab="cfg";renderTabs();
  const t=templates[d];
  a.appendChild(el("div","row","<div style='flex:1'><h1>Treino "+d+"</h1></div>"));
  const nm=el("input");nm.type="text";nm.value=t.name;nm.oninput=()=>{t.name=nm.value;save(K.tpl,templates);};
  const nc=el("div","card");nc.appendChild(el("label","fld","Nome do treino"));nc.appendChild(nm);a.appendChild(nc);

  t.ex.forEach((e,i)=>{
    const c=el("div","ex");
    const h=el("div","row");h.style.justifyContent="space-between";
    const nmi=el("input");nmi.type="text";nmi.value=e.n;nmi.style.textAlign="left";nmi.oninput=()=>{e.n=nmi.value;save(K.tpl,templates);};
    h.appendChild(nmi);
    const del=el("button","del","×");del.onclick=()=>{t.ex.splice(i,1);save(K.tpl,templates);editTemplate(d);};
    h.appendChild(del);c.appendChild(h);
    const g=el("div","grid4");g.style.marginTop="8px";
    const sr=fldInput("Alvo",e.sr,"text",v=>{e.sr=v;save(K.tpl,templates);});
    const rs=fldInput("Desc(s)",e.rest,"number",v=>{e.rest=parseInt(v)||0;save(K.tpl,templates);});
    const nt=fldInput("Notas",e.notes,"text",v=>{e.notes=v;save(K.tpl,templates);});
    const mv=el("div");mv.appendChild(el("label","fld","🔑 MVW"));
    const mb=el("button",e.mvw?"btn-primary btn-sm":"btn-ghost btn-sm",e.mvw?"Sim":"Não");mb.style.width="100%";
    mb.onclick=()=>{e.mvw=!e.mvw;save(K.tpl,templates);editTemplate(d);};mv.appendChild(mb);
    g.appendChild(sr);g.appendChild(rs);g.appendChild(nt);g.appendChild(mv);
    c.appendChild(g);
    const ig=el("div");ig.style.marginTop="8px";ig.appendChild(el("label","fld","Imagem do exercício (URL) — opcional"));
    const ii=el("input");ii.type="url";ii.placeholder="https://...jpg/gif";ii.style.textAlign="left";ii.value=e.img||"";
    ii.oninput=()=>{e.img=ii.value.trim();save(K.tpl,templates);};
    const sb=el("button","btn-ghost btn-sm","🔍 Buscar imagem");sb.style.marginTop="6px";sb.onclick=()=>openExDemo(e.n);
    ig.appendChild(ii);ig.appendChild(sb);c.appendChild(ig);
    a.appendChild(c);
  });
  const add=el("button","btn-ghost","+ Exercício");add.style.width="100%";
  add.onclick=()=>{t.ex.push({n:"Novo exercício",sr:"3×10",rest:60,mvw:false,notes:""});save(K.tpl,templates);editTemplate(d);};
  a.appendChild(add);
  const bk=el("button","btn-primary","✓ Concluir");bk.style.width="100%";bk.style.marginTop="8px";bk.onclick=()=>go("cfg");
  a.appendChild(bk);
}
function fldInput(lb,val,type,on){const w=el("div");w.appendChild(el("label","fld",lb));
  const i=el("input");i.type=type;if(type==="text")i.style.textAlign="left";i.value=val==null?"":val;i.oninput=()=>on(i.value);
  w.appendChild(i);return w;}

function doImport(){const inp=document.createElement("input");inp.type="file";inp.accept=".json,application/json";
  inp.onchange=()=>{const f=inp.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=()=>{try{const d=JSON.parse(rd.result);
      if(d.templates)templates=d.templates;if(d.sessions)sessions=d.sessions;if(d.cfg)cfg=d.cfg;
      save(K.tpl,templates);save(K.sess,sessions);save(K.cfg,cfg);toast("Importado ✓");render();
    }catch(e){toast("Arquivo inválido");}};rd.readAsText(f);};inp.click();}
function exportAllMd(){if(!sessions.length){toast("Sem treinos");return;}
  const all=sessions.map(sessionMarkdown).join("\n\n---\n\n");
  download("Treinos ("+today()+").md",all,"text/markdown");}

/* ============ BOOT ============ */
requestPersist();applyTheme();
render();
</script>
